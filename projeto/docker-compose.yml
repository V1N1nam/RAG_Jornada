version: "3.9"

services:

  db:
    image: ankane/pgvector:latest
    container_name: projeto-db
    restart: always
    environment:
      POSTGRES_USER: raguser
      POSTGRES_PASSWORD: ragpass
      POSTGRES_DB: ragdb
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:6.2-alpine
    container_name: projeto-redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  evolution-api:
    image: atendai/evolution-api:latest
    container_name: projeto-evolution-api
    restart: always
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_started
    ports:
      - "8080:8080"
    environment:
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://raguser:ragpass@db:5432/ragdb

      REDIS_HOST: redis
      REDIS_PORT: 6379
      CACHE_REDIS_URI: redis://redis:6379/6
      CACHE_ENGINE: redis
      CACHE_ENABLED: "true"

      AUTHENTICATION_API_KEY: 123456

      # 🔥 FIX DO QR / BAILEYS (IMPORTANTE)
      CONFIG_SESSION_PHONE_VERSION: 2.3000.1037828507
      WEB_VERSION: 2.3000.1037828507

      TZ: America/Sao_Paulo

  api:
    build: .
    container_name: projeto-api
    restart: always
    depends_on:
      - db
      - redis
      - evolution-api
    ports:
      - "8000:8000"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      EVOLUTION_URL: http://evolution-api:8080

volumes:
  db_data: