version: "3.9"

services:

  projeto-db:
    image: ankane/pgvector:latest
    container_name: projeto-db
    restart: always
    environment:
      POSTGRES_USER: raguser
      POSTGRES_PASSWORD: ragpass
      POSTGRES_DB: ragdb
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  projeto-redis:
    image: redis:6.2-alpine
    container_name: projeto-redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  projeto-api:
    build: .
    container_name: projeto-api
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://raguser:ragpass@projeto-db:5432/ragdb
    depends_on:
      - projeto-db
      - projeto-redis

  projeto-evolution-api:
    image: atendai/evolution-api:latest
    container_name: projeto-evolution-api
    restart: always
    ports:
      - "8080:8080"
    environment:
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://raguser:ragpass@projeto-db:5432/ragdb

      REDIS_HOST: projeto-redis
      REDIS_PORT: 6379

      CACHE_ENGINE: redis
      CACHE_ENABLED: "true"
      CACHE_REDIS_URI: redis://projeto-redis:6379/6

      AUTHENTICATION_API_KEY: 123456

      TZ: America/Sao_Paulo

      CONFIG_SESSION_PHONE_VERSION: 2.3000.1037828507
      WEB_VERSION: 2.3000.1037828507

    depends_on:
      - projeto-db
      - projeto-redis

volumes:
  pgdata: