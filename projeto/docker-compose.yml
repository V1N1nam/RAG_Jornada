version: "3.9"

services:

  db:
    image: ankane/pgvector:latest
    container_name: projeto-db
    restart: always
    environment:
      POSTGRES_DB: ragdb
      POSTGRES_USER: raguser
      POSTGRES_PASSWORD: ragpass
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:6.2-alpine
    container_name: projeto-redis
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  evolution-api:
    image: atendai/evolution-api:latest
    container_name: projeto-evolution-api
    restart: always
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_started
    ports:
      - "8080:8080"
    environment:

      # 🔐 AUTH
      AUTHENTICATION_API_KEY: "123456"

      # 🧠 DATABASE
      DATABASE_PROVIDER: "postgresql"
      DATABASE_CONNECTION_URI: "postgresql://raguser:ragpass@db:5432/ragdb"

      # ⚡ REDIS (IMPORTANTE — corrige seu erro de disconnect)
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CACHE_ENGINE: redis
      CACHE_ENABLED: "true"
      CACHE_REDIS_URI: redis://redis:6379/6

      # 🤖 WHATSAPP (CORREÇÃO DO SEU ERRO “Invalid integration”)
      INTEGRATION: WHATSAPP-BAILEYS
      PROVIDER: BAILEYS

      # 🕒 TIMEZONE
      TZ: America/Sao_Paulo

  api:
    build: .
    container_name: projeto-api
    restart: always
    depends_on:
      - db
      - redis
      - evolution-api
    ports:
      - "8000:8000"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ragdb
      DB_USER: raguser
      DB_PASSWORD: ragpass
      REDIS_HOST: redis
      REDIS_PORT: 6379
      OPENAI_API_KEY: ${k-	proj-3zr0sTt6tYM9R0JgKiHdu7gb6jgAAo1TErgH7ZAp20mllFH1O	QAGuqIOrr0icD6vPgNrlQ09O-T3BlbkFJ28Z32ok-	o5BP6fYtoixRJshaxwdwEx7z995Aj_tYYJ1O1xdtOSDkWBvXz2jcSq	MULGKgLN898A}
      USE_REAL_API: "true"
      VECTORSTORE_PATH: data/vectorstore/faiss_index
      EVOLUTION_URL: http://evolution-api:8080

volumes:
  pgdata: